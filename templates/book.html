<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container">
        <h1>📋 Book an Appointment</h1>
        <p class="subtitle">Get AI-powered doctor recommendations</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="symptoms">Describe your symptoms:</label>
                <textarea id="symptoms" name="symptoms" rows="4" required placeholder="Please describe your symptoms in detail..."></textarea>
            </div>
            
            <button type="submit" class="btn">Get AI Recommendation</button>
        </form>
        
        <div class="navigation">
            <a href="/" class="btn">← Back to Home</a>
        </div>
    </div>
</body>
</html>
