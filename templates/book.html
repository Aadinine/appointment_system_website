<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container">
        <h1>📋 Book an Appointment</h1>
        <p class="subtitle">Get AI-powered doctor recommendations</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="symptoms">Describe your symptoms:</label>
                <textarea id="symptoms" name="symptoms" rows="4" placeholder="e.g., chest pain, headache, fever..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-robot me-2"></i>Get AI Recommendations
            </button>
        </form>
        
        <div class="navigation">
            <a href="/specialists" class="btn">👨‍⚕️ Browse All Doctors</a>
            <a href="/" class="btn">🏠 Home</a>
        </div>
    </div>
</body>
</html>
